<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>Enterprise Policy Intelligence</title>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Enterprise RAG benchmark</p>
        <h1>Policy Intelligence</h1>
        <p>Ask a question against policy evidence you are authorised to access.</p>
        <div class="identity">
          <span id="identity-status">Not signed in</span>
          <button id="sign-in" type="button">Sign in with Microsoft</button>
          <button id="sign-out" class="secondary" type="button" hidden>Sign out</button>
        </div>
      </header>
      <form id="ask-form">
        <label>
          Question
          <textarea id="question" required minlength="3" placeholder="How much can I claim for home-office equipment?"></textarea>
        </label>
        <label class="date-field">As of<input id="as-of" type="date" required /></label>
        <button id="ask" type="submit">Ask policy assistant</button>
      </form>
      <section id="result" hidden>
        <p id="status"></p>
        <h2>Answer</h2>
        <p id="answer"></p>
        <ol id="citations"></ol>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
